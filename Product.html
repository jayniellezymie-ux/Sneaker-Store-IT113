<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Preview</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mea+Culpa&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="product-preview">
    <div class="preview-container">
        <div class="preview-image">
            <img src="" alt="Product">
        </div>
        <div class="preview-details">
            <h1></h1>
            <h2></h2>
            <p class="description"></p>

            <div class="sizes">
                <h3>Select Size:</h3>
                <button class="size-btn">7</button>
                <button class="size-btn">8</button>
                <button class="size-btn">9</button>
                <button class="size-btn">10</button>
                <button class="size-btn">11</button>
            </div>

            <div class="preview-buttons">
    <button id="back-btn">Back</button>
    <button id="add-to-cart">Add to Bag</button> 
</div>
            <button id="favorite-btn">❤</button>
        </div>
    </div>
</section>

<script src="script.js"></script>
</body>
</html>
